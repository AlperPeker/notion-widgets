<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Meeting Countdown</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      font-family:
        Inter,
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        sans-serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;

      background: #f7f6f3;
      color: #2f3437;
    }

    .card {
      width: 100%;
      height: 100%;
      min-height: 180px;
      padding: 24px;

      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;

      text-align: center;
      border-radius: 18px;
    }

    .label {
      margin-bottom: 10px;

      font-size: clamp(18px, 3vw, 30px);
      font-weight: 600;
      opacity: 0.65;
    }

    .countdown {
      font-size: clamp(36px, 8vw, 82px);
      font-weight: 800;
      line-height: 1.05;
      letter-spacing: -0.04em;
    }

    .meeting-date {
      margin-top: 16px;

      font-size: clamp(14px, 2.5vw, 21px);
      font-weight: 500;
      opacity: 0.55;
    }

    @media (prefers-color-scheme: dark) {
      body {
        background: #191919;
        color: #f1f1ef;
      }
    }
  </style>
</head>

<body>
  <main class="card">
    <div class="label">Weekly is in</div>

    <div
      id="countdown"
      class="countdown"
    >
      Calculating...
    </div>

    <div
      id="meeting-date"
      class="meeting-date"
    ></div>
  </main>

  <script>
    const MEETING_DAY = 2;

    const MEETING_HOUR = 18;
    const MEETING_MINUTE = 0;

    function getNextMeeting(now) {
      const meeting = new Date(now);

      meeting.setHours(
        MEETING_HOUR,
        MEETING_MINUTE,
        0,
        0
      );

      const daysUntilTuesday =
        (MEETING_DAY - now.getDay() + 7) % 7;

      meeting.setDate(
        now.getDate() + daysUntilTuesday
      );

      if (meeting <= now) {
        meeting.setDate(meeting.getDate() + 7);
      }

      return meeting;
    }

    function formatCountdown(milliseconds) {
      const totalSeconds = Math.max(
        0,
        Math.floor(milliseconds / 1000)
      );

      const days = Math.floor(
        totalSeconds / 86400
      );

      const hours = Math.floor(
        (totalSeconds % 86400) / 3600
      );

      const minutes = Math.floor(
        (totalSeconds % 3600) / 60
      );

      const seconds =
        totalSeconds % 60;

      if (days > 0) {
        return `${days} day ${hours} hours`;
      }

      if (hours > 0) {
        return `${hours} hours ${minutes} mins`;
      }

      if (minutes > 0) {
        return `${minutes} mins ${seconds} secs`;
      }

      return `${seconds} secs`;
    }

    function updateCountdown() {
      const now = new Date();
      const nextMeeting = getNextMeeting(now);

      const remainingTime =
        nextMeeting.getTime() - now.getTime();

      document
        .getElementById("countdown")
        .textContent =
          formatCountdown(remainingTime);

      document
        .getElementById("meeting-date")
        .textContent =
          new Intl.DateTimeFormat("tr-TR", {
            weekday: "long",
            day: "numeric",
            month: "long",
            hour: "2-digit",
            minute: "2-digit"
          }).format(nextMeeting);
    }

    updateCountdown();

    setInterval(
      updateCountdown,
      1000
    );
  </script>
</body>
</html>
